<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box1 {
        border: 3px solid black;
      }

      .box2 {
        border: 4px dashed green;
      }

      .box3 {
        border: 5px dotted red;
      }

      .box {
        width: 200px;
        padding: 10px;
        margin: 10px;
      }
    </style>
  </head>
  <body>
    <div class="box box1">Border: 3px solid black</div>

    <div class="box box2">Border: 4px dashed green</div>

    <div class="box box3">Border: 5px dotted red</div>
  </body>
</html>
