<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 10px;
      }
      .box {
        width: 200px;
        border: 3px solid black;
        background-color: lightblue;
      }

      .box1 {
        padding: 20px;
      }

      .box2 {
        padding: 10px 20px;
      }

      .box3 {
        padding: 10px 20px 30px;
      }
    </style>
  </head>
  <body>
    <div class="box box1">Padding: 20px</div>

    <div class="box box2">Padding: 10px 20px</div>

    <div class="box box3">Padding: 10px 20px 30px</div>
  </body>
</html>
