<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .box {
        background-color: lightblue;
        border: 2px solid black;
        width: 200px;
      }

      .box1 {
        margin: 20px;
      }

      .box2 {
        margin: 10px 20px;
      }

      .box3 {
        margin: 10px 20px 30px;
      }
    </style>
  </head>
  <body>
    <div class="box box1">Box 1 (margin: 20px)</div>

    <div class="box box2">Box 2 (margin: 10px 20px)</div>

    <div class="box box3">Box 3 (margin: 10px 20px 30px)</div>
  </body>
</html>
