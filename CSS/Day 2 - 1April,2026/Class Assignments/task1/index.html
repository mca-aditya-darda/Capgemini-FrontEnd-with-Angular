<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      div p {
        background-color: red;
      }

      div > p {
        background-color: aqua;
      }

      h1 ~ p {
        background-color: blue;
      }

      h1 + p {
        background-color: yellow;
      }
    </style>
  </head>
  <body>
    <div>
      <p>Para 1</p>
      <p>Para 2</p>
      <section>
        <p>Para 3</p>
      </section>
      <h1>HELLO</h1>
      <p>Para 4</p>
      <p>HIII</p>
    </div>
  </body>
</html>
