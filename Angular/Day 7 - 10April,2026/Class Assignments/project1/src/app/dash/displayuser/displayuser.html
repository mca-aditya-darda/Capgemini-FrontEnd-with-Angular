<h2>Display User Works!</h2>

<!-- @for (item of userService.userData; track $index) {

<p>Users List</p>

<div class="user-container">
  @for (item of userService.userData; track $index) {
    <div class="user-card">
      <img [src]="item.image" alt="user" />

      <div class="user-info">
        <h3>{{ item.name }}</h3>
        <p>{{ item.role }}</p>
      </div>
    </div>
  }
</div>
