<h1>Home Works!</h1>
<h2>Table Example</h2>
<table mat-table [dataSource]="students">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef>Name</th>
    <td mat-cell *matCellDef="let student">{{ student.name }}</td>
  </ng-container>

  <ng-container matColumnDef="rollNo">
    <th mat-header-cell *matHeaderCellDef>Roll No</th>
    <td mat-cell *matCellDef="let student">{{ student.rollNo }}</td>
  </ng-container>

  <ng-container matColumnDef="branch">
    <th mat-header-cell *matHeaderCellDef>Branch</th>
    <td mat-cell *matCellDef="let student">{{ student.branch }}</td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

  <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
</table>

<h2>Button Example</h2>
<button mat-flat-button color="primary">Click Me</button>
